name: watchdog

# Hourly self-check: if the main monitor workflow hasn't run successfully
# in the last 30 minutes, send an alert. This catches the case where GitHub
# silently disables the cron, the runner is broken, or something else stops
# the monitor without us noticing.

on:
  schedule:
    - cron: "17 * * * *" # every hour at :17
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: SMTP selftest (canal email vivo?)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python <<'PY'
          import os, smtplib, requests

          user = (os.environ.get("EMAIL_USER") or "").strip()
          pwd = (os.environ.get("EMAIL_PASSWORD") or "").strip()
          if not (user and pwd):
              print("SMTP selftest: skipped (no credentials configured)")
              raise SystemExit(0)

          host = (os.environ.get("EMAIL_SMTP_HOST") or "smtp.gmail.com").strip()
          port = int((os.environ.get("EMAIL_SMTP_PORT") or "587").strip())

          # Tentar autenticar (sem enviar email). Se a App Password expirou
          # ou o Gmail bloqueou login, este passo falha e podemos avisar via
          # ntfy — canal independente do email. Sem isto, descobríamos só
          # quando aparecesse o aviso real e o email não chegasse.
          try:
              with smtplib.SMTP(host, port, timeout=20) as s:
                  s.starttls()
                  s.login(user, pwd)
                  s.noop()
              print("SMTP selftest: OK")
              raise SystemExit(0)
          except SystemExit:
              raise
          except Exception as exc:
              err = f"{type(exc).__name__}: {exc}"
              print(f"SMTP selftest: FAILED — {err}")

          # Avisar via ntfy (canal independente).
          topic = (os.environ.get("NTFY_TOPIC") or "").strip()
          if topic:
              server = (os.environ.get("NTFY_SERVER") or "https://ntfy.sh").strip()
              try:
                  requests.post(
                      f"{server.rstrip('/')}/{topic}",
                      data=(
                          "Canal de EMAIL está partido — App Password expirou, "
                          "credenciais inválidas, ou Gmail bloqueou login. Os "
                          "alertas de incentivo EV podem não chegar por email "
                          "até resolveres isto. ntfy continua a funcionar.\n\n"
                          f"Erro SMTP: {err}\n"
                          f"User: {user}\n"
                          f"Host: {host}:{port}"
                      ).encode("utf-8"),
                      headers={
                          "Title": "🔧 Email do monitor partido",
                          "Priority": "high",
                          "Tags": "warning,email",
                      },
                      timeout=15,
                  ).raise_for_status()
                  print("ntfy alert: sent")
              except Exception as e:
                  print(f"ntfy alert: failed ({e})")
          # Não fazemos fail do step — não queremos que isto bloqueie o
          # check de freshness que vem a seguir.
          PY

      - name: Verify monitor freshness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python <<'PY'
          import os, sys, datetime, requests, smtplib
          from email.mime.text import MIMEText

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          api = f"https://api.github.com/repos/{repo}/actions/workflows/monitor.yml/runs"
          r = requests.get(
              api,
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
              params={"per_page": 5, "status": "success"},
              timeout=20,
          )
          r.raise_for_status()
          runs = r.json().get("workflow_runs", [])
          if not runs:
              print("No successful runs found at all — alerting.")
              last_age_min = 9999
              last_ts = "never"
          else:
              last = runs[0]
              last_ts = last["updated_at"]
              dt = datetime.datetime.fromisoformat(last_ts.replace("Z", "+00:00"))
              now = datetime.datetime.now(datetime.timezone.utc)
              last_age_min = (now - dt).total_seconds() / 60
              print(f"Last successful run: {last_ts} ({last_age_min:.1f} min ago)")

          # GitHub Actions delays cron schedules under load; */5 frequently
          # stretches to 30-60 min between fires on free tier. We only alert
          # if it's been >90 min — that's a real problem worth waking up for.
          if last_age_min <= 90:
              print(f"OK — monitor is fresh ({last_age_min:.1f} min).")
              sys.exit(0)

          title = "⚠️ Monitor com atraso — incentivo EV"
          body = (
              f"O workflow monitor.yml não corre com sucesso há "
              f"{last_age_min:.0f} minutos (limiar: 90 min).\n"
              f"Último run OK: {last_ts}\n\n"
              "Pode ser apenas atraso de scheduling do GitHub Actions, mas "
              "vale a pena dar uma olhada em:\n"
              f"https://github.com/{repo}/actions"
          )

          # ntfy
          topic = (os.environ.get("NTFY_TOPIC") or "").strip()
          if topic:
              server = (os.environ.get("NTFY_SERVER") or "https://ntfy.sh").strip()
              try:
                  requests.post(
                      f"{server.rstrip('/')}/{topic}",
                      data=body.encode("utf-8"),
                      headers={"Title": title, "Priority": "urgent", "Tags": "warning"},
                      timeout=15,
                  ).raise_for_status()
                  print("ntfy: sent")
              except Exception as e:
                  print(f"ntfy error: {e}")

          # email
          if os.environ.get("EMAIL_USER") and os.environ.get("EMAIL_TO"):
              try:
                  msg = MIMEText(body, "plain", "utf-8")
                  msg["Subject"] = title
                  msg["From"] = os.environ["EMAIL_USER"]
                  msg["To"] = os.environ["EMAIL_TO"]
                  with smtplib.SMTP(
                      os.environ.get("EMAIL_SMTP_HOST", "smtp.gmail.com"),
                      int(os.environ.get("EMAIL_SMTP_PORT", "587")),
                      timeout=15,
                  ) as s:
                      s.starttls()
                      s.login(os.environ["EMAIL_USER"], os.environ["EMAIL_PASSWORD"])
                      s.send_message(msg)
                  print("email: sent")
              except Exception as e:
                  print(f"email error: {e}")

          # Failure exit so the watchdog itself shows red — extra signal.
          sys.exit(1)
          PY
