name: monitor-incentivo

on:
  schedule:
    # Every 5 minutes. GitHub may delay/skip on heavy load — that's expected.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "monitor/**"
      - ".github/workflows/monitor.yml"

concurrency:
  group: monitor-incentivo
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m monitor.main

      - name: Commit state
        run: |
          if [ -z "$(git status --porcelain state.json)" ]; then
            echo "no state change to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update monitor state"
          # Tolerate races with parallel runs: retry with rebase up to 5 times.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, rebasing and retrying..."
            git pull --rebase --autostash origin main || true
            sleep 2
          done
          echo "WARN: failed to push state after 5 attempts (notifications already sent)"
          exit 0
